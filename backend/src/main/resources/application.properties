# Cấu hình cổng chạy Server
server.port=8080

# Cấu hình kết nối SQL Server (Đổi YOUR_PASSWORD thành mật khẩu tài khoản sa của bạn)
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=fullstack_db;encrypt=true;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=12345
spring.datasource.driverClassName=com.microsoft.sqlserver.jdbc.SQLServerDriver

# Cấu hình Hibernate (Bản lề của JPA)
# update: Tự động tạo bảng/cột trong DB nếu trong Java code có khai báo thực thể mới
spring.jpa.hibernate.ddl-auto=update

# Hiển thị các câu lệnh SQL mà Hibernate tự động sinh ra trên màn hình console (rất tốt để học và debug)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

